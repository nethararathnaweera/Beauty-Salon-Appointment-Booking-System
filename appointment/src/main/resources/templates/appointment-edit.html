<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Appointment</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>Edit Appointment</h1>

    <form action="/updateAppointment" method="post">

        <!-- Hidden fields -->
        <input type="hidden" name="id"
               th:value="${appointment.appointmentID}">
        <input type="hidden" name="customerID"
               th:value="${appointment.customerID}">

        <label>Customer Name</label>
        <input type="text" name="customerName"
               th:value="${appointment.customerName}" required>

        <label>Service Type</label>
        <select name="serviceType">
            <option value="Haircut"
                    th:selected="${appointment.serviceType == 'Haircut'}">Haircut</option>
            <option value="Hair Coloring"
                    th:selected="${appointment.serviceType == 'Hair Coloring'}">Hair Coloring</option>
            <option value="Facial"
                    th:selected="${appointment.serviceType == 'Facial'}">Facial</option>
            <option value="Manicure"
                    th:selected="${appointment.serviceType == 'Manicure'}">Manicure</option>
            <option value="Pedicure"
                    th:selected="${appointment.serviceType == 'Pedicure'}">Pedicure</option>
        </select>

        <label>Date</label>
        <input type="date" name="date"
               th:value="${appointment.date}" required>

        <label>Time</label>
        <input type="time" name="time"
               th:value="${appointment.time}" required>

        <label>Status</label>
        <select name="status">
            <option value="PENDING"
                    th:selected="${appointment.status.name() == 'PENDING'}">Pending</option>
            <option value="CONFIRMED"
                    th:selected="${appointment.status.name() == 'CONFIRMED'}">Confirmed</option>
            <option value="COMPLETED"
                    th:selected="${appointment.status.name() == 'COMPLETED'}">Completed</option>
            <option value="CANCELLED"
                    th:selected="${appointment.status.name() == 'CANCELLED'}">Cancelled</option>
        </select>

        <button type="submit">Update Appointment</button>

    </form>

    <br>
    <a href="/appointments">Cancel</a>

</div>

</body>
</html>
