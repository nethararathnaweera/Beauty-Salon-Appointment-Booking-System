<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Appointments</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>All Appointments</h1>

    <a href="/appointment"><button>+ Book New Appointment</button></a>

    <br><br>

    <table border="1" style="width:100%; border-collapse:collapse;">
        <tr>
            <th>ID</th>
            <th>Customer ID</th>
            <th>Customer Name</th>
            <th>Service</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        <tr th:each="appt : ${appointments}">
            <td th:text="${appt.appointmentID}"></td>
            <td th:text="${appt.customerID}"></td>
            <td th:text="${appt.customerName}"></td>
            <td th:text="${appt.serviceType}"></td>
            <td th:text="${appt.date}"></td>
            <td th:text="${appt.time}"></td>
            <td th:text="${appt.status}"></td>
            <td>
                <a th:href="@{/editAppointment/{id}(id=${appt.appointmentID})}">
                    <button>Edit</button>
                </a>
                <a th:href="@{/deleteAppointment/{id}(id=${appt.appointmentID})}"
                   onclick="return confirm('Delete this appointment?')">
                    <button>Delete</button>
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
