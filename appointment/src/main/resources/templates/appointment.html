<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Book Appointment</h1>
        <p>Schedule your beauty session at our salon</p>
    </div>

    <div th:if="${error}" class="error-box">
        <p th:text="${error}"></p>
    </div>

    <form action="/saveAppointment" method="post">

        <input type="hidden" name="customerID"
               th:value="${customerID}">

        <div class="info-box">
            <span>Logged in as</span>
            <strong>
                <span th:text="${customerName}"></span>
                <span> | Customer ID: </span>
                <span th:text="${customerID}"></span>
            </strong>
        </div>

        <div class="form-group">
            <label>Customer Name</label>
            <input type="text"
                   name="customerName"
                   th:value="${customerName}"
                   readonly
                   required>
        </div>

        <div class="form-group">
            <label>Service Type</label>
            <select name="serviceType" id="serviceSelect"
                    onchange="updatePrice()">
                <option value="Haircut"       data-price="1500">
                    Haircut — Rs. 1,500</option>
                <option value="Hair Coloring" data-price="2500">
                    Hair Coloring — Rs. 2,500</option>
                <option value="Facial"        data-price="1800">
                    Facial — Rs. 1,800</option>
                <option value="Manicure"      data-price="1200">
                    Manicure — Rs. 1,200</option>
                <option value="Pedicure"      data-price="1000">
                    Pedicure — Rs. 1,000</option>
            </select>
        </div>

        <div class="price-box">
            <span>Total Amount</span>
            <strong id="priceDisplay">Rs. 1,500</strong>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Date (Today or Future only)</label>
                <input type="date" name="date"
                       id="dateInput" required>
            </div>
            <div class="form-group">
                <label>Time (8:00 AM — 4:00 PM only)</label>
                <input type="time" name="time"
                       min="08:00" max="16:00" required>
            </div>
        </div>

        <button type="submit" class="btn-primary">
            Book Appointment
        </button>

    </form>

    <a href="/appointments" class="back-link">
        View My Appointments
    </a>

</div>

<script>
    document.getElementById('dateInput').min =
        new Date().toISOString().split('T')[0];

    function updatePrice() {
        var sel = document.getElementById('serviceSelect');
        var price = sel.options[sel.selectedIndex]
            .getAttribute('data-price');
        document.getElementById('priceDisplay').textContent =
            'Rs. ' + parseInt(price).toLocaleString();
    }
</script>
</body>
</html>
