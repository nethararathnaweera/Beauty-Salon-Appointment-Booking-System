<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Customer Dashboard</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="container">

    <h1>Customer Management</h1>

    <div class="top-button">

        <a href="/customer">

            <button>
                + Add New Customer
            </button>

        </a>

    </div>

    <div class="table-wrapper">

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Phone</th>

                <th>Membership</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="customer : ${customers}">

                <td th:text="${customer.id}"></td>

                <td th:text="${customer.name}"></td>

                <td th:text="${customer.email}"></td>

                <td th:text="${customer.phone}"></td>

                <td>

                    <span class="membership-badge"
                          th:text="${customer.membershipType}">
                    </span>

                </td>

                <td>

                    <div class="actions">

                        <a th:href=
                           "@{/editCustomer/{id}
                           (id=${customer.id})}">

                            <button class="edit-btn">
                                Edit
                            </button>

                        </a>

                        <a th:href=
                           "@{/deleteCustomer/{id}
                           (id=${customer.id})}"

                           onclick=
                           "return confirm(
                           'Delete this customer?')">

                            <button class="delete-btn">
                                Delete
                            </button>

                        </a>

                    </div>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
