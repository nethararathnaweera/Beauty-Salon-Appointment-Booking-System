<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Customer List</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="container">

    <h1>Customer Management</h1>

    <div class="top-button">

        <a href="/customer">

            <button>
                + Add New Customer
            </button>

        </a>

    </div>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Phone</th>

            <th>Membership</th>

            <th>Actions</th>

        </tr>

        <tr th:each="customer : ${customers}">

            <td th:text="${customer.id}"></td>

            <td th:text="${customer.name}"></td>

            <td th:text="${customer.email}"></td>

            <td th:text="${customer.phone}"></td>

            <td th:text="${customer.membershipType}"></td>

            <td class="actions">

                <a th:href=
                   "@{/editCustomer/{id}
                   (id=${customer.id})}">

                    <button>
                        Edit
                    </button>

                </a>

                <a th:href=
                   "@{/deleteCustomer/{id}
                   (id=${customer.id})}"

                   onclick=
                   "return confirm(
                   'Delete this customer?')">

                    <button>
                        Delete
                    </button>

                </a>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
