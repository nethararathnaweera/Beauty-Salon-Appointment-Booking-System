<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Service List</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
        }
        .container {
            max-width: 1300px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            display: inline-block;
            margin-right: 8px;
        }

        .btn-success { background-color: #28a745; color: white; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .action-bar {
            display: flex;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #343a40;
            color: white;
            padding: 14px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background-color: #f1f3f5;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Salon Service Catalogue</h1>

    <!-- Add New Service Button -->
    <a href="/services/new" class="btn btn-success">+ Add New Service</a>

    <br><br>

    <!-- Search Form -->
    <form action="/services" method="get" class="search-box">
        <input type="text" name="category" placeholder="Search by category" th:value="${category}">
        <button type="submit" class="btn btn-primary">Search</button>
        <a href="/services" class="btn btn-secondary">Clear</a>
    </form>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Duration</th>
            <th>Description</th>
            <th>Info</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="service : ${services}">
            <td th:text="${service.id}"></td>
            <td th:text="${service.type}"></td>
            <td th:text="${service.name}"></td>
            <td th:text="${service.category}"></td>
            <td th:text="${service.price}"></td>
            <td th:text="${service.duration} + ' mins'"></td>
            <td th:text="${service.description}"></td>
            <td th:text="${service.serviceInfo}"></td>
            <td>
                <div class="action-bar">
                    <a th:href="@{'/services/edit/' + ${service.id}}" class="btn btn-primary">✏️ Edit</a>

                    <form th:action="@{'/services/delete/' + ${service.id}}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Are you sure you want to delete this service?')">
                            🗑️ Delete
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
</tr>
</tbody>
</table>
</div>

</body>
</html>
