<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register Customer</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="container">

    <h1>Register New Customer</h1>

    <form action="/saveCustomer"
          method="post">

        <input type="text"
               name="name"
               placeholder="Enter Full Name"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email Address"
               required>

        <input type="text"
               name="phone"
               placeholder="Enter Phone Number"
               required>

        <div class="membership-container">

            <label class="membership-card regular-card">

                <input type="radio"
                       name="membershipType"
                       value="Regular"
                       checked>

                <div class="card-content">

                    <h2>✨ Regular</h2>

                    <p>
                        Standard salon membership
                    </p>

                </div>

            </label>

            <label class="membership-card premium-card">

                <input type="radio"
                       name="membershipType"
                       value="Premium">

                <div class="card-content">

                    <h2>👑 Premium</h2>

                    <p>
                        VIP premium customer access
                    </p>

                </div>

            </label>

        </div>

        <button type="submit">
            Register Customer
        </button>

    </form>

    <a class="back-link"
       href="/customers">

        View All Customers

    </a>

</div>

</body>
</html>
